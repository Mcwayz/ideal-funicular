name: PM Platform CI/CD

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: pm-platform
  KUBE_CLUSTER: pm-platform-cluster

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    # Backend Tests (Spring Boot)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'corretto'
    - name: Run Backend Tests
      run: |
        echo "Mock running mvn test"
        # cd backend && mvn clean test

    # Frontend Tests (Next.js)
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Run Frontend Tests
      run: |
        echo "Mock running npm test"
        # cd frontend && npm ci && npm run test

    # Build and Push Images
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "Mock docker build and push"
        # docker build -t $ECR_REGISTRY/$ECR_REPOSITORY-backend:$IMAGE_TAG -f infra/Dockerfile.backend .
        # docker push $ECR_REGISTRY/$ECR_REPOSITORY-backend:$IMAGE_TAG
        # docker build -t $ECR_REGISTRY/$ECR_REPOSITORY-frontend:$IMAGE_TAG -f infra/Dockerfile.frontend .
        # docker push $ECR_REGISTRY/$ECR_REPOSITORY-frontend:$IMAGE_TAG

  deploy:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Update Kubeconfig
      run: aws eks update-kubeconfig --name ${{ env.KUBE_CLUSTER }} --region ${{ env.AWS_REGION }}

    - name: Deploy to Kubernetes
      run: |
        echo "Mock deploying to k8s"
        # kubectl apply -f infra/k8s/deployments.yml
        # kubectl set image deployment/pm-backend pm-backend=$ECR_REGISTRY/$ECR_REPOSITORY-backend:${{ github.sha }}
        # kubectl set image deployment/pm-frontend pm-frontend=$ECR_REGISTRY/$ECR_REPOSITORY-frontend:${{ github.sha }}
